name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Atlas
        uses: ariga/setup-atlas@v0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Validate Atlas Schema
        run: atlas schema inspect --dev-url 'sqlite://dev?mode=memory' --url file://packages/db/schema

      - name: Apply Database Migrations
        run: DATABASE_URL='sqlite:///tmp/opencode-ci.db' pnpm db:apply

      - name: Verify ORM Schema Sync
        run: |
          DATABASE_PATH='/tmp/opencode-ci.db' pnpm db:sync
          git diff --exit-code -- packages/orm/src/schema.ts packages/orm/src/relations.ts

      - name: Build
        run: pnpm build
